<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#1a0800"/>
    </linearGradient>
    <linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="flame-g" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ef4444"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo icon -->
  <g transform="translate(540, 100) scale(2.5)">
    <rect width="40" height="40" rx="10" fill="url(#fire)"/>
    <g transform="translate(8, 6) scale(1)">
      <path d="M12 2C8.5 7 4 9.5 4 14a8 8 0 0016 0c0-4.5-4.5-7-8-12z" fill="white" opacity="0.95"/>
    </g>
  </g>
  
  <!-- Main heading line 1 -->
  <text x="600" y="290" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="-2">
    Stop Being Broke.
  </text>
  
  <!-- Main heading line 2 (orange gradient simulated) -->
  <text x="600" y="365" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="900" fill="url(#fire)" letter-spacing="-2">
    Start Taking Control.
  </text>
  
  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#71717a" font-weight="400">
    The personal finance app that tells you the truth about your money.
  </text>
  
  <!-- Bottom pill -->
  <rect x="480" y="475" width="240" height="50" rx="25" fill="url(#fire)"/>
  <text x="600" y="507" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700" fill="white">
    🔥 WalletRoast
  </text>
  
  <!-- Stats row -->
  <text x="300" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#52525b">
    12,400+ Users
  </text>
  <text x="500" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#52525b">
    $340K+ Saved
  </text>
  <text x="700" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#52525b">
    48% Score Improvement
  </text>
  <text x="900" y="580" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#52525b">
    Free to Start
  </text>
</svg>
